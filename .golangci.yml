version: "2"

run:
  timeout: 3m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck # includes gosimple in v2
    - unused
    - gocritic
    - revive
  settings:
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
        - name: var-naming
          disabled: true
  exclusions:
    presets:
      - std-error-handling
    rules:
      # Relax some linters for test files
      - path: _test\.go
        linters:
          - errcheck
          - gocritic

formatters:
  enable:
    - gofmt

output:
  formats:
    text:
      path: stdout
      print-linter-name: true
