version: "3"

dotenv: [".env"]

vars:
  BINARY: onecli
  CMD_PATH: ./cmd/onecli
  VERSION: '{{.VERSION | default "dev"}}'

tasks:
  build:
    desc: Build the onecli binary
    cmds:
      - go build -ldflags "-X main.version={{.VERSION}}" -o {{.BINARY}} {{.CMD_PATH}}
    sources:
      - ./**/*.go
    generates:
      - ./{{.BINARY}}

  run:
    desc: Build and run onecli
    deps: [build]
    cmds:
      - ./{{.BINARY}} {{.CLI_ARGS}}

  dev:
    desc: Build and run onecli against local dev server
    deps: [build]
    cmds:
      - ./{{.BINARY}} {{.CLI_ARGS}}
    env:
      ONECLI_ENV: dev
      ONECLI_API_HOST: http://localhost:10254

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  test:race:
    desc: Run tests with race detector
    cmds:
      - go test -race ./...

  test:coverage:
    desc: Run tests with coverage report
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html

  fmt:
    desc: Format all Go files
    cmds:
      - gofmt -w .

  lint:
    desc: Run static analysis
    cmds:
      - golangci-lint run ./...

  tidy:
    desc: Clean up dependencies
    cmds:
      - go mod tidy

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f {{.BINARY}} coverage.out coverage.html
